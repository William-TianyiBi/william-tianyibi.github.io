short_bio: >-
  <p>
    I am an undergraduate student in Robotics at SUSTech (expected graduation: June 2027), focusing on
    robot manipulation, tactile sensing, and mechanism design.
  </p>
  <p>
    My current work spans visuo-tactile learning pipelines and robotic hardware prototyping, with research
    experience in UniVTAC simulation, underactuated adaptive grippers, and multi-modal handheld tactile devices.
  </p>
  <p>
    I am interested in contact-rich manipulation, embodied intelligence, and integrating robust mechanical design with
    data-driven control.
  </p>

