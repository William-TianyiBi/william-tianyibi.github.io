short_bio: >-
  <p>
    I am a Robotics undergraduate at Southern University of Science and Technology (SUSTech), Shenzhen, China
    (B.Eng., expected June 2027), working on contact-rich manipulation, tactile intelligence, and mechanism-driven
    robot design.
  </p>
  <p>
    My work bridges learning and hardware through visuo-tactile policy training (UniVTAC), underactuated adaptive hand
    synthesis (SPARK Hand), and multi-modal teleoperation interfaces (Tactile-UMI).
  </p>
  <p>
    I was a co-author of an IROS 2025 paper on SPARK Hand and a Global Champion (1st Place) in ASME SMRDC 2025.
    I aim to build robust embodied systems where principled mechanics and data-driven control reinforce each other.
  </p>

