short_bio: >-
  <p>
    I am a Robotics undergraduate at Southern University of Science and Technology (SUSTech), Shenzhen, China
    (B.Eng., expected June 2027), focusing on contact-rich manipulation, tactile intelligence, and mechanism-driven
    robot design.
  </p>
  <p>
    My work bridges learning and hardware: visuo-tactile policy training (UniVTAC), underactuated adaptive hand
    synthesis (SPARK Hand), and multi-modal teleoperation interfaces (Tactile-UMI).
  </p>
  <p>
    I was co-author of an IROS 2025 paper on SPARK Hand and a Global Champion (1st Place) in ASME SMRDC 2025.
    I aim to build robust embodied systems where principled mechanics and data-driven control reinforce each other.
  </p>

personal_statement: >-
  <p>
    I believe the future of intelligent robotics lies at the intersection of physical structure and adaptive intelligence.
    My training in robotics has taught me that strong performance in real-world manipulation is not achieved by algorithms
    alone, but by the co-design of mechanism, sensing, and control.
  </p>
  <p>
    Through SPARK Hand, UniVTAC, and Tactile-UMI, I have developed a research style that starts from task constraints,
    translates them into measurable design principles, and validates them in both simulation and prototype systems. This
    process has shaped my long-term goal: to contribute to embodied intelligence for dexterous and reliable manipulation
    in unstructured environments, and to translate that research into practical robotic capability.
  </p>

